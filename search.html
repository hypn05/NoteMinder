<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Notes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2a2a2a;
      --bg-hover: #3a3a3a;
      --text-primary: #e0e0e0;
      --text-secondary: #999999;
      --accent-color: #4a9eff;
      --border-color: #3a3a3a;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
      color: var(--text-primary);
      overflow: hidden;
    }

    .search-container {
      background: var(--bg-primary);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .search-header {
      padding: 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 15px;
      font-size: 20px;
      color: var(--text-secondary);
    }

    .search-input {
      width: 100%;
      padding: 12px 45px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent-color);
    }

    .search-hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }

    .results-container {
      max-height: 280px;
      overflow-y: auto;
    }

    .result-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .result-item:hover,
    .result-item.selected {
      background: var(--bg-hover);
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-icon {
      font-size: 24px;
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-details {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .result-content {
      font-size: 14px;
      line-height: 1.4;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 14px;
    }

    /* Custom scrollbar */
    .results-container::-webkit-scrollbar {
      width: 8px;
    }

    .results-container::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    .results-container::-webkit-scrollbar-thumb {
      background: var(--bg-secondary);
      border-radius: 4px;
    }

    .results-container::-webkit-scrollbar-thumb:hover {
      background: var(--bg-hover);
    }

    .highlight {
      background-color: rgba(74, 158, 255, 0.3);
      padding: 2px 0;
      border-radius: 2px;
    }

    /* Password result styles */
    .password-result {
      /* Subtle distinction without being overwhelming */
    }

    .copy-password-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .result-item:hover .copy-password-btn,
    .result-item.selected .copy-password-btn {
      opacity: 1;
      color: var(--accent-color);
      border-color: var(--accent-color);
    }

    .copy-password-btn:hover {
      background: rgba(74, 158, 255, 0.1);
      transform: scale(1.1);
    }

    .copy-password-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="search-container">
    <div class="search-header">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="search-input" 
          class="search-input" 
          placeholder="Search notes and passwords..."
          autofocus
        >
      </div>
      <div class="search-hint">Press Esc to close</div>
    </div>
    <div class="results-container" id="results-container">
      <div class="empty-state">
        <div class="empty-state-icon">📝</div>
        <div class="empty-state-text">Type to search your notes</div>
      </div>
    </div>
  </div>

  <script src="search-renderer.js"></script>
</body>
</html>
