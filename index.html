<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteMinder</title>
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Reminder Banner (appears at top of screen) -->
  <div id="reminder-banner" class="reminder-banner hidden">
    <div class="reminder-banner-content">
      <div class="reminder-banner-icon">⏰</div>
      <div class="reminder-banner-text">
        <div class="reminder-banner-title">Reminder</div>
        <div class="reminder-banner-message"></div>
      </div>
      <button class="reminder-banner-close">✕</button>
    </div>
  </div>
  
  <div id="app">
    <!-- Arrow Tab (leftmost) -->
    <div id="arrow-tab">
      <span id="arrow-icon">◀</span>
    </div>

    <!-- Custom width-resize handle (native horizontal resize is unreliable
         on transparent frameless windows, so this is driven manually) -->
    <div id="resize-handle"></div>

    <!-- Custom window controls, shown only in undocked (windowed) mode
         since the frameless window has no native title bar to provide them -->
    <div id="window-controls">
      <button id="win-close" class="win-btn win-close" title="Dock back to the screen edge"></button>
      <button id="win-minimize" class="win-btn win-minimize" title="Minimize"></button>
      <button id="win-maximize" class="win-btn win-maximize" title="Maximize"></button>
    </div>

    <!-- Sidebar (Notes List) -->
    <div id="sidebar" class="collapsed">
      <div id="sidebar-content">
        <!-- Header -->
        <div id="header">
          <h1>NoteMinder</h1>
          
          <!-- Search -->
          <div id="search-container">
            <span id="search-icon">🔍</span>
            <input 
              type="text" 
              id="search-input" 
              class="input" 
              placeholder="Search notes..."
            >
          </div>
          
          <!-- Tabs -->
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="notes" title="Notes">
              <span class="tab-icon">📝</span>
              <span class="tab-count" id="notes-count">0</span>
            </button>
            <button class="sidebar-tab" data-tab="passwords" title="Passwords">
              <span class="tab-icon">🔐</span>
              <span class="tab-count" id="passwords-count">0</span>
            </button>
            <button class="sidebar-tab" data-tab="clips" title="Clips">
              <span class="tab-icon">📋</span>
              <span class="tab-count" id="clips-count">0</span>
            </button>
          </div>
        </div>

        <!-- Tab Content Container -->
        <div class="tab-content-container">
          <!-- Notes Tab -->
          <div class="tab-content active" data-content="notes">
            <button id="new-note-btn" class="new-item-btn">
              ➕ New Note
            </button>
            <div id="tag-filters" class="tag-filters hidden"></div>
            <div id="notes-container"></div>
          </div>

          <!-- Passwords Tab -->
          <div class="tab-content" data-content="passwords">
            <button id="new-password-btn" class="new-item-btn">
              🔐 New Password
            </button>
            <div id="passwords-container"></div>
          </div>

          <!-- Clips Tab -->
          <div class="tab-content" data-content="clips">
            <button id="new-clip-btn" class="new-item-btn" title="Save the current clipboard contents">
              📋 Add from Clipboard
            </button>
            <div style="text-align: center; font-size: 11px; color: var(--text-tertiary); margin: -8px 0 12px;">
              or press ⌘⇧V from anywhere
            </div>
            <div id="clips-container"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Editor -->
    <div id="editor-container">
      <!-- Editor Header -->
      <div id="editor-header">
        <input id="note-title" class="note-title-input" type="text" placeholder="Untitled" spellcheck="false" />
        <div id="editor-actions">
          <div class="dropdown">
            <button id="insert-menu-dropdown" class="btn btn-icon" title="Insert">
              ➕
            </button>
            <div class="dropdown-menu hidden"></div>
          </div>
          <button id="btn-shortcuts" class="btn btn-icon" title="Keyboard Shortcuts (⌘/)">
            ⌨️
          </button>
          <button id="btn-search" class="btn btn-icon" title="Search (⌘⇧Space)">
            🔍
          </button>
          <button id="btn-color" class="btn btn-icon" title="Background Color">
            🎨
          </button>
          <button id="btn-reminder" class="btn btn-icon" title="Set Reminder">
            ⏰
          </button>
          <button id="btn-dock-toggle" class="btn btn-icon" title="Undock into a normal window">
            🗗
          </button>
        </div>
      </div>

      <!-- Floating formatting toolbar: appears near selected text instead of
           a fixed always-visible row -->
      <div id="format-toolbar" class="format-toolbar hidden">
        <button class="format-btn" data-cmd="bold" title="Bold"><strong>B</strong></button>
        <button class="format-btn" data-cmd="italic" title="Italic"><em>I</em></button>
        <button class="format-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <span class="format-sep"></span>
        <button class="format-btn" data-heading="1" title="Heading 1">H1</button>
        <button class="format-btn" data-heading="2" title="Heading 2">H2</button>
        <button class="format-btn" data-heading="3" title="Heading 3">H3</button>
        <span class="format-sep"></span>
        <button class="format-btn" data-action="code" title="Code">&lt;/&gt;</button>
        <button class="format-btn" data-action="link" title="Link">🔗</button>
      </div>

      <!-- Note-link autocomplete: appears while typing [[ in the editor -->
      <div id="link-autocomplete" class="link-autocomplete hidden"></div>

      <!-- Find-in-note bar (hidden by default) -->
      <div id="find-bar" class="find-bar hidden">
        <input type="text" id="find-input" placeholder="Find in note…" spellcheck="false" />
        <span id="find-counter" class="find-counter">0 / 0</span>
        <button id="find-prev" class="btn btn-small" title="Previous (Shift+Enter)">↑</button>
        <button id="find-next" class="btn btn-small" title="Next (Enter)">↓</button>
        <button id="find-close" class="btn btn-small" title="Close (Esc)">✕</button>
      </div>

      <!-- Editor Content -->
      <div id="editor" contenteditable="true" data-placeholder="Start typing your note..."></div>

      <!-- Editor Footer (word/char count) -->
      <div id="editor-footer" class="editor-footer">
        <span id="word-count">0 words</span>
        <span class="editor-footer-sep">·</span>
        <span id="char-count">0 characters</span>
      </div>
    </div>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
